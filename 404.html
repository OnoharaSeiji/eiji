<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada | Eiji — Desafio Objetivo</title>
  <meta name="description" content="Página não encontrada no projeto de estudos do Eiji." />
  <link rel="stylesheet" href="style.css" />
  <style>
    .erro-404-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
    }

    .erro-404-card {
      width: min(720px, calc(100% - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 32px 24px;
      text-align: center;
    }

    .erro-404-codigo {
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 1;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 12px;
    }

    .erro-404-titulo {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 4vw, 2rem);
    }

    .erro-404-texto {
      max-width: 560px;
      margin: 0 auto 20px;
      color: var(--text-soft);
      font-size: 1rem;
    }

    .erro-404-acoes {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .erro-404-box {
      margin-top: 22px;
      padding: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-soft);
    }

    .erro-404-box strong {
      color: var(--text);
    }

    @media (max-width: 640px) {
      .erro-404-acoes {
        flex-direction: column;
      }

      .erro-404-acoes a,
      .erro-404-acoes button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="erro-404-wrap">
    <section class="erro-404-card">
      <p class="erro-404-codigo">404</p>
      <h1 class="erro-404-titulo">Ops. Esta página não foi encontrada.</h1>
      <p class="erro-404-texto">
        O link pode estar quebrado, a página pode ter sido renomeada ou você pode ter digitado o endereço errado.
      </p>

      <div class="erro-404-acoes">
        <a class="btn btn-principal" href="./index.html">Voltar para o cronograma</a>
        <a class="btn btn-secundario" id="btnApostilaHoje" href="./index.html">Ir para a apostila de hoje</a>
      </div>

      <div class="erro-404-box" id="statusPlano">
        Verificando o dia atual do cronograma...
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    (function () {
      const btnApostilaHoje = document.getElementById("btnApostilaHoje");
      const statusPlano = document.getElementById("statusPlano");

      if (!window.CONFIG || typeof window.getDiaPorData !== "function") {
        statusPlano.innerHTML = "<strong>Atenção:</strong> Não foi possível carregar o cronograma. Use o botão para voltar à página principal.";
        btnApostilaHoje.href = "./index.html";
        btnApostilaHoje.textContent = "Voltar para o cronograma";
        return;
      }

      const hoje = new Date();
      const hojeISO = [
        hoje.getFullYear(),
        String(hoje.getMonth() + 1).padStart(2, "0"),
        String(hoje.getDate()).padStart(2, "0")
      ].join("-");

      const diaHoje = getDiaPorData(hojeISO);

      if (diaHoje) {
        btnApostilaHoje.href = `./${diaHoje.arquivo}`;
        btnApostilaHoje.textContent = `Ir para a apostila de hoje`;
        statusPlano.innerHTML = `
          <strong>Hoje no plano:</strong> Dia ${String(diaHoje.numero).padStart(3, "0")} — ${diaHoje.titulo}
        `;
      } else {
        btnApostilaHoje.href = "./index.html";
        btnApostilaHoje.textContent = "Ver cronograma completo";
        statusPlano.innerHTML = `
          <strong>Hoje está fora do intervalo do cronograma.</strong><br>
          Use o botão acima para acessar a página principal e escolher a semana desejada.
        `;
      }
    })();
  </script>
</body>
</html>
